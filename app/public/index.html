<!-- index.html -->
<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <title>Kritzel</title>
  <link rel="stylesheet" href="game.css" />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard/build/css/index.css">
  <!-- Ensure CSS is loaded -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background-color: #000350">
  <div class="simple-keyboard"></div>
  <div class="head">
    <img src="kritzel.png" alt="Kritzel Logo" height="60vh" />
  </div>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>
  <div class="row">
    <div class="column users-column">
      <div class="users-container">
        <!-- Users will be listed here -->
      </div>
    </div>
    <div class="column canvas-column">
      <canvas id="drawingCanvas"></canvas>
      <div class="toolbar">
        <!-- Color Buttons -->
        <div id="colorPicker">
          <div class="color-button selected" data-color="#000000" style="background-color: #000000;"></div>
          <div class="color-button" data-color="#FF0000" style="background-color: #FF0000;"></div>
          <div class="color-button" data-color="#00FF00" style="background-color: #00FF00;"></div>
          <div class="color-button" data-color="#0000FF" style="background-color: #0000FF;"></div>
          <div class="color-button" data-color="#FFFF00" style="background-color: #FFFF00;"></div>
          <div class="color-button" data-color="#FF00FF" style="background-color: #FF00FF;"></div>
          <div class="color-button" data-color="#00FFFF" style="background-color: #00FFFF;"></div>
          <div class="color-button" data-color="#FFFFFF" style="background-color: #FFFFFF;"></div>
        </div>

        <!-- Pen Size Buttons -->
        <div class="penSizePicker">
          <div class="pen-size-btn pen-size-small" data-size="2" title="Size 2"></div>
          <div class="pen-size-btn pen-size-medium" data-size="3" title="Size 3"></div>
          <div class="pen-size-btn pen-size-large" data-size="6" title="Size 6"></div>
        </div>

        <!-- Tool Selection Buttons -->
        <div class="tool-selection">
          <div class="tool-button" data-tool="pen" title="Pen">
            <!-- SVG Icon -->
          </div>
          <div class="tool-button" data-tool="fill" title="Fill">
            <!-- SVG Icon -->
          </div>
          <div class="tool-button" data-tool="eraser" title="Eraser">
            <!-- SVG Icon -->
          </div>
          <div class="clear-canvas-btn" title="Clear Canvas">
            <!-- SVG Icon -->
          </div>
        </div>
      </div>
    </div>
    <div class="column chat-column">
      <div class="chat-container">
        <div class="chat-messages">
          <!-- Chat messages will appear here -->
        </div>
        <div class="chat-input">
          <!-- Replace <input> with <div> -->
          <div id="chatMessage" class="chat-input-div" contenteditable="false" tabindex="0"
            placeholder="Nachricht eingeben..." role="textbox" aria-label="Chat message input"></div>
          <button id="sendButton">Senden</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Include simple-keyboard's JS via bundler or script tag -->
  <script src="bundle.js"></script>
</body>

</html>
