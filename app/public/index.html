<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <title>Kritzel</title>
  <link rel="stylesheet" href="game.css" />
</head>

<body style="background-color: #000350">
  <div class="head">
    <img src="kritzel.png" alt="Kritzel Logo" height="60vh" />
  </div>
  <div class="row">
    <div class="column">Test</div>
    <div class="column">
      <canvas id="drawingCanvas"></canvas>
      <div class="toolbar">
        <input type="color" id="colorPicker" value="#000000" />
        <input type="range" id="penSize" min="3" max="10" value="5" />

        <div class="icon" id="penTool">
          <svg xmlns="http://www.w3.org/2000/svg" height="5vh" viewBox="0 -960 960 960" width="5vh" fill="#ffffff">
            <path
              d="M80 0v-160h800V0H80Zm160-320h56l312-311-29-29-28-28-311 312v56Zm-80 80v-170l448-447q11-11 25.5-17t30.5-6q16 0 31 6t27 18l55 56q12 11 17.5 26t5.5 31q0 15-5.5 29.5T777-687L330-240H160Zm560-504-56-56 56 56ZM608-631l-29-29-28-28 57 57Z" />
          </svg>
        </div>
        <div class="icon" id="fillTool">
          <svg xmlns="http://www.w3.org/2000/svg" height="5vh" viewBox="0 -960 960 960" width="5vh" fill="#ffffff">
            <path
              d="M346-140 100-386q-10-10-15-22t-5-25q0-13 5-25t15-22l230-229-106-106 62-65 400 400q10 10 14.5 22t4.5 25q0 13-4.5 25T686-386L440-140q-10 10-22 15t-25 5q-13 0-25-5t-22-15Zm47-506L179-432h428L393-646Zm399 526q-36 0-61-25.5T706-208q0-27 13.5-51t30.5-47l42-54 44 54q16 23 30 47t14 51q0 37-26 62.5T792-120Z" />
          </svg>
        </div>
        <div class="icon" id="eraserTool">
          <svg xmlns="http://www.w3.org/2000/svg" height="5vh" viewBox="0 -960 960 960" width="5vh" fill="#ffffff">
            <path
              d="M690-240h190v80H610l80-80Zm-500 80-85-85q-23-23-23.5-57t22.5-58l440-456q23-24 56.5-24t56.5 23l199 199q23 23 23 57t-23 57L520-160H190Zm296-80 314-322-198-198-442 456 64 64h262Zm-6-240Z" />
          </svg>
        </div>
        <div class="icon" id="clearCanvas">
          <svg xmlns="http://www.w3.org/2000/svg" height="5vh" viewBox="0 -960 960 960" width="5vh" fill="#ffffff">
            <path
              d="m376-300 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 180q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520Zm-400 0v520-520Z" />
          </svg>
        </div>
      </div>
    </div>
    <div class="column">
      <div class="chat-container">
        <div class="chat-messages">
          <!-- Chat messages will appear here -->
        </div>
        <div class="chat-input">
          <input type="text" id="chatMessage" placeholder="Nachricht eingeben...">
          <button id="sendButton">Senden</button>
        </div>
      </div>
    </div>
  </div>

  <div id="mousePosition"></div>

  <script src="bundle.js"></script>
</body>

</html>
